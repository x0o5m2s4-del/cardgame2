<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>카드 짝 맞추기</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="container">

    <h1>카드 짝 맞추기</h1>

    <div id="start-screen">

      <input
        type="text"
        id="studentId"
        placeholder="학번 입력"
      />

      <input
        type="text"
        id="name"
        placeholder="이름 입력"
      />

      <button onclick="startGame()">
        게임 시작
      </button>

    </div>

    <p>
      점수:
      <span id="score">0</span>
    </p>

    <div id="game-board"></div>

  </div>

  <script
    type="module"
    src="script.js"
  ></script>

</body>
</html>
