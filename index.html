<div class="container">

  <h1>카드 짝 맞추기</h1>

  <div id="start-screen">

    <input
      type="text"
      id="studentId"
      placeholder="학번 입력"
    />

    <input
      type="text"
      id="name"
      placeholder="이름 입력"
    />

    <button onclick="startGame()">
      게임 시작
    </button>

  </div>


  <div id="game-screen">

    <h2>
      점수 :
      <span id="score">0</span>
    </h2>

    <div id="game-board"></div>

  </div>

</div>
